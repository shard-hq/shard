name: Bug report
description: Report unexpected behavior in Shard
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can reproduce and fix the issue quickly.

        **Security note:** do not use this form to report a vulnerability. See [SECURITY.md](https://github.com/shard-hq/shard/blob/main/SECURITY.md) for the private disclosure process.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I have searched [existing issues](https://github.com/shard-hq/shard/issues?q=is%3Aissue) and this bug has not been reported.
          required: true
        - label: I am running the latest commit on `main` (or noted the commit/version below).
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual behavior
      description: Include the full error message and stack trace if there is one.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Bun version, discord.js version, Shard commit SHA, and OS.
      placeholder: |
        Bun: 1.3.14
        discord.js: 14.26.4
        Shard: dcfd2ee
        OS: macOS 15.3
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs (token redacted), screenshots, related issues.
    validations:
      required: false
