name: Bug report
description: Report unexpected behavior in Shard
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can reproduce and fix the issue quickly.

        **Security note**: do not use this form to report a vulnerability. See [SECURITY.md](https://github.com/shard-hq/shard/blob/main/SECURITY.md) for the private disclosure process.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      description: Before filing, please confirm the following.
      options:
        - label: I have searched [existing issues](https://github.com/shard-hq/shard/issues?q=is%3Aissue) and this bug has not been reported.
          required: true
        - label: I am running the latest commit on `main` (or I have noted the commit/version below).
          required: true
        - label: This is not a security vulnerability (those go through [SECURITY.md](https://github.com/shard-hq/shard/blob/main/SECURITY.md)).
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the unexpected behavior.
      placeholder: When I run `/ping`, the bot replies with the wrong latency.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps to trigger the bug.
      placeholder: |
        1. Start the bot with `bun run dev`
        2. In Discord, run `/ping`
        3. Observe the reply
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The reply should show the WebSocket latency in ms.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full error message and stack trace if there is one.
      placeholder: The reply shows `Pong! NaNms`.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output. Redact your bot token and any user IDs you do not want public.
      render: shell
    validations:
      required: false

  - type: input
    id: bun-version
    attributes:
      label: Bun version
      description: Output of `bun --version`.
      placeholder: "1.3.14"
    validations:
      required: true

  - type: input
    id: discordjs-version
    attributes:
      label: discord.js version
      description: From `package.json` or `bun pm ls`.
      placeholder: "14.26.4"
    validations:
      required: true

  - type: input
    id: shard-version
    attributes:
      label: Shard version / commit
      description: Tag, release, or commit SHA you are running.
      placeholder: "dcfd2ee"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows (native)
        - Windows (WSL)
        - Docker / container
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, related issues, recent changes to your config.
    validations:
      required: false
