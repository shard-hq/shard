name: Feature request
description: Suggest a new feature for Shard
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Describe the **use case first**, not the implementation — discussion happens on the issue before code is written.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I have searched [existing issues](https://github.com/shard-hq/shard/issues?q=is%3Aissue) and this has not been requested.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem does this solve? Who benefits and how?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would this work from a user's perspective? Command names, options, expected output.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out, workarounds you currently use.
    validations:
      required: false
